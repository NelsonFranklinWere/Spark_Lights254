<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script>
        // Redirect www to non-www
        if (window.location.hostname === 'www.sparklights.co.ke') {
            window.location.replace('https://sparklights.co.ke' + window.location.pathname + window.location.search + window.location.hash);
        }
    </script>
    <meta http-equiv="refresh" content="0; url=https://sparklights.co.ke/">
    <link rel="canonical" href="https://sparklights.co.ke/" />
</head>
<body>
    <p>Redirecting to <a href="https://sparklights.co.ke/">sparklights.co.ke</a>...</p>
</body>
</html>
